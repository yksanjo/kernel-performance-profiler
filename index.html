<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel Performance Profiler - CUDA/OpenCL Profiling</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #0a0e17; --bg-secondary: #111827; --bg-card: #1a2332; --text-primary: #f0f4f8; --text-secondary: #94a3b8; --text-muted: #64748b; --accent-blue: #3b82f6; --accent-cyan: #06b6d4; --accent-green: #10b981; --accent-yellow: #f59e0b; --accent-red: #ef4444; --accent-purple: #8b5cf6; --border-color: #2d3748; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .header { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 20px 40px; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .header-title h1 { font-size: 22px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { padding: 32px 40px; max-width: 1600px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: var(--bg-card); border-radius: 16px; padding: 24px; border: 1px solid var(--border-color); text-align: center; }
        .stat-value { font-size: 32px; font-weight: 700; }
        .stat-label { font-size: 14px; color: var(--text-muted); }
        .kernel-section { background: var(--bg-card); border-radius: 16px; padding: 24px; border: 1px solid var(--border-color); margin-bottom: 32px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .kernel-item { display: flex; align-items: center; gap: 16px; padding: 16px; background: var(--bg-secondary); border-radius: 12px; margin-bottom: 12px; }
        .kernel-name { flex: 1; font-weight: 600; font-size: 14px; }
        .kernel-time { font-size: 18px; font-weight: 700; color: var(--accent-cyan); }
    </style>
</head>
<body>
    <header style="background:var(--bg-secondary);border-bottom:1px solid var(--border-color);padding:20px 40px;display:flex;align-items:center;gap:16px;">
        <div class="logo-icon">⚡</div>
        <div class="header-title"><h1>Kernel Performance Profiler</h1><p style="color:var(--text-secondary);font-size:13px;">CUDA/OpenCL kernel profiling & optimization</p></div>
    </header>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" style="color:var(--accent-cyan);">12</div><div class="stat-label">Kernels Analyzed</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--accent-green);">2.4ms</div><div class="stat-label">Avg Kernel Time</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--accent-purple);">89%</div><div class="stat-label">GPU Utilization</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--accent-yellow);">247</div><div class="stat-label">SM Occupancy</div></div>
        </div>
        <div class="kernel-section">
            <h3 class="section-title">🔥 Top Kernels by Execution Time</h3>
            <div class="kernel-item"><span class="kernel-name">matmul_kernel_f16</span><span class="kernel-time">4.2ms</span></div>
            <div class="kernel-item"><span class="kernel-name">conv2d_forward_kernel</span><span class="kernel-time">3.8ms</span></div>
            <div class="kernel-item"><span class="kernel-name">softmax_kernel</span><span class="kernel-time">1.2ms</span></div>
            <div class="kernel-item"><span class="kernel-name">relu_activation</span><span class="kernel-time">0.4ms</span></div>
        </div>
    </div>
</body>
</html>
